# Pull-and-run stack: uses prebuilt images from GHCR (built by GitHub Actions),
# so the host never runs pnpm install / next build.
#
#   docker compose -f deploy/docker-compose.deploy.yml --env-file deploy/.env.prod pull
#   docker compose -f deploy/docker-compose.deploy.yml --env-file deploy/.env.prod up -d
#
# Set GHCR_OWNER in deploy/.env.prod (your GitHub username, e.g. ahmedtahseenkhan).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  api:
    image: ghcr.io/${GHCR_OWNER}/justmac-api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: "4000"
      API_CORS_ORIGIN: ${API_CORS_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "4000:4000"

  web:
    image: ghcr.io/${GHCR_OWNER}/justmac-web:latest
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3100:3100"

volumes:
  pgdata:
